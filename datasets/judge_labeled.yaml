# Hand-labelled set for validating the summary judge against a human grader.
#
# Each example pairs a ticket with a candidate one-line summary and the score a
# human (me) assigned against the same 1-3 rubric the judge uses:
#   3 = accurate + concise, no invented detail
#   2 = gist captured but vague/slightly off
#   1 = misrepresents/omits the issue, empty, or hallucinated
#
# This is what `eval judge-validate` grades the judge against. The set is small
# and deliberately mixes clean, vague, hallucinated, empty, and verbose-but-
# correct summaries so the agreement number is honest rather than flattering.

- id: j01
  input: "My card was charged twice for order #4471."
  summary: "Customer was charged twice for the same order and wants a refund."
  human_score: 3

- id: j02
  input: "How do I change the email on my account?"
  summary: "Customer asks how to change their account email address."
  human_score: 3

- id: j03
  input: "The app crashes when I tap export."
  summary: "App crashes on export; user blocked."
  human_score: 3

- id: j04
  input: "When will my package arrive? Tracking hasn't updated in 3 days."
  summary: "Customer asking about delayed package and stale tracking."
  human_score: 3

- id: j05
  input: "Do you offer a student discount on the annual plan?"
  summary: "Inquiry about student discount for annual plan."
  human_score: 3

# Vague — gist-ish but says almost nothing specific.
- id: j06
  input: "I can't log in after the update."
  summary: "Customer has an issue."
  human_score: 2

# Hallucinated detail (anger, a March billing error) not in the ticket.
- id: j07
  input: "Please cancel my subscription."
  summary: "Customer wants to cancel and is angry about a billing error in March."
  human_score: 1

# Empty summary.
- id: j08
  input: "I was double billed this month."
  summary: ""
  human_score: 1

- id: j09
  input: "Refund still not received after two weeks."
  summary: "Customer reports refund not received after two weeks."
  human_score: 3

- id: j10
  input: "Your website is down, I can't check out!"
  summary: "Website down; customer cannot complete checkout."
  human_score: 3

# Plain wrong — summary describes a different request entirely.
- id: j11
  input: "I need a copy of my invoice."
  summary: "Customer wants to upgrade to the premium plan."
  human_score: 1

# Verbose but correct — a fair judge scores this 3; a length-biased one won't.
- id: j12
  input: "Reset password link not working."
  summary: "The customer is reporting that the password reset link they received via email does not appear to be functioning correctly when clicked, preventing them from regaining access to their account at this time."
  human_score: 3
